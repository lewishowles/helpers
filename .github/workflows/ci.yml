name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}

      - name: Run tests
        run: bun run test:unit:run

      - name: Check README is current
        run: bun run check:readme

      - name: Check exports
        run: bun run check:exports

      - name: Check helpers have tests
        run: bun run check:test-coverage

      - name: Check helpers have type declarations
        run: bun run check:type-declarations

      - name: Check runtime dependencies
        run: bun run check:runtime-deps

      - name: Build package
        run: bun run build

      - name: Check package exports
        run: bun run publint

      - name: Check types are correct
        run: bun run attw
